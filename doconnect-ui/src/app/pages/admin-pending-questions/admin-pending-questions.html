<div class="admin-page">
  <h2>Pending Questions</h2>
  <p class="error-text" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="admin-card" *ngFor="let q of questions">
    <ng-container *ngIf="editingQuestionId !== q.questionId; else editBlock">
      <h3>{{ q.questionTitle }}</h3>
      <p>{{ q.questionText }}</p>
      <p><strong>Topic:</strong> {{ q.topic || 'General' }}</p>
      <img *ngIf="q.imageUrl" [src]="questionService.resolveImageUrl(q.imageUrl)" [alt]="q.questionTitle" class="admin-image">

      <div class="actions">
        <button class="approve" (click)="approve(q.questionId)">Approve</button>
        <button class="reject" (click)="reject(q.questionId)">Reject</button>
        <button class="edit-btn" (click)="startEdit(q)">Edit</button>
        <button class="delete-btn" (click)="deleteQuestion(q.questionId)">Delete</button>
      </div>
    </ng-container>

    <ng-template #editBlock>
      <label>Title</label>
      <input [(ngModel)]="editForm.questionTitle" type="text">

      <label>Description</label>
      <textarea [(ngModel)]="editForm.questionText" rows="5"></textarea>

      <label>Topic</label>
      <select [(ngModel)]="editForm.topic">
        <option *ngFor="let topicOption of availableTopics" [value]="topicOption">{{ topicOption }}</option>
      </select>

      <div class="actions">
        <button class="approve" (click)="saveEdit(q.questionId)">Save</button>
        <button class="reject" (click)="cancelEdit()">Cancel</button>
      </div>
    </ng-template>
  </div>

  <p class="empty-state" *ngIf="!questions.length && !errorMessage">No pending questions.</p>
</div>
