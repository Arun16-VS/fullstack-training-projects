<div class="form-page">
  <div class="form-card">
    <h2>Ask a Question</h2>

    <label>Question Title</label>
    <input [(ngModel)]="questionTitle" type="text" placeholder="Enter question title">

    <label>Question Description</label>
    <textarea [(ngModel)]="questionText" rows="6" placeholder="Describe your question"></textarea>

    <label>Topic</label>
    <select [(ngModel)]="topic">
      <option value="" disabled>Select a topic</option>
      <option *ngFor="let topicOption of availableTopics" [value]="topicOption">
        {{ topicOption }}
      </option>
    </select>

    <label>Image (optional)</label>
    <input type="file" accept="image/*" (change)="onImageSelected($event)">

    <div class="success" *ngIf="message">{{ message }}</div>
    <div class="error" *ngIf="error">{{ error }}</div>

    <button (click)="submitQuestion()" [disabled]="isSubmitting">
      {{ isSubmitting ? 'Posting...' : 'Post Question' }}
    </button>
  </div>
</div>
