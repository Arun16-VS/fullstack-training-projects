<div class="auth-page">
  <div class="auth-card">
    <div class="icon-circle">&#8594;</div>
    <h1>Welcome Back</h1>
    <p>Sign in to your DoConnect account</p>

    <form (ngSubmit)="onLogin()">
      <label>Username</label>
      <input [(ngModel)]="username" name="username" type="text" placeholder="Enter your username" required>

      <label>Password</label>
      <input [(ngModel)]="password" name="password" type="password" placeholder="Enter your password" required>

      <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

      <button type="submit">Sign In</button>
    </form>

    <div class="bottom-link">
      Don't have an account? <a routerLink="/register">Register</a>
    </div>
  </div>
</div>
